<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="lec10.css">
</head>
<body>
    <!-- class=choices=container    class=item=choice -->
    <h1 id="h11">Rock Paper Scissors</h1>
    <!-- container -->
    <div class="container">
        <!-- container items --> 
        <div class="item" id="rock">
            <img src="rock.png" alt="rock">
        </div>
        <div class="item" id="paper">
            <img src="paper.png" alt="paper">
        </div>
        <div class="item" id="scissors">
            <img src="scissors.png" alt="scissors">
        </div>
    </div>
        
        <!-- score-board -->
        <div class="score-board">
             <!-- score user -->
            <div class="score">
                <p id="user-score">0</p>
                <p>You</p>
            </div>
            <!-- score comp -->
            <div class="score">
                <p id="comp-score">0</p>
                <p>computer</p>
            </div>
        </div>
            <!--message container  -->
        <div class="msg-container"> 
            <p id="msg">PLAY YOUR TURN</p>
        </div>


   
     

    <script src="lec10.js"></script>
</body>
</html>
